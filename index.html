
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ACX Pro Tools Checklist</title>
<style>
  :root {
    --bg: #0e0e12;
    --surface: #17171f;
    --card: #1e1e28;
    --card2: #252530;
    --border: #2e2e3d;
    --accent: #00c9a7;
    --accent2: #7b61ff;
    --accent3: #ff6b6b;
    --accent4: #ffd166;
    --text: #f0f0f5;
    --text2: #9999b5;
    --text3: #666680;
    --progress-h: 4px;
    --radius: 20px;
    --radius-sm: 12px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-top: env(safe-area-inset-top, 0px);
    font-family: -apple-system, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overscroll-behavior: none;
  }

  /* ── HEADER ── */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(14,14,18,0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: calc(var(--safe-top) + 10px) 16px 0;
    border-bottom: 1px solid var(--border);
  }

  .header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 10px;
  }

  .header-title {
    display: flex;
    flex-direction: column;
  }

  .header-title span:first-child {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
  }

  .header-title span:last-child {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.3px;
  }

  .hamburger {
    width: 40px; height: 40px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 5px; cursor: pointer;
    background: var(--card); border-radius: 10px;
    border: 1px solid var(--border);
    flex-shrink: 0;
  }

  .hamburger span {
    display: block; width: 18px; height: 2px;
    background: var(--text); border-radius: 2px;
    transition: all 0.3s ease;
  }

  .hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(5px,5px); }
  .hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
  .hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(5px,-5px); }

  /* ── PROGRESS BAR ── */
  .progress-wrap {
    padding: 8px 0 0;
  }

  .progress-labels {
    display: flex; justify-content: space-between;
    font-size: 11px; color: var(--text3); margin-bottom: 5px;
  }

  .progress-track {
    height: var(--progress-h);
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
    width: 0%;
  }

  .section-progress-row {
    display: flex; gap: 6px; margin-top: 8px; padding-bottom: 10px;
  }

  .section-pip {
    flex: 1; height: 3px; border-radius: 2px;
    background: var(--border); overflow: hidden; cursor: pointer;
  }

  .section-pip-fill {
    height: 100%; width: 0%;
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .section-pip[data-section="0"] .section-pip-fill { background: var(--accent); }
  .section-pip[data-section="1"] .section-pip-fill { background: var(--accent2); }
  .section-pip[data-section="2"] .section-pip-fill { background: var(--accent3); }
  .section-pip[data-section="3"] .section-pip-fill { background: var(--accent4); }

  /* ── DRAWER NAV ── */
  .drawer-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.6);
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s ease;
    backdrop-filter: blur(4px);
  }

  .drawer-overlay.open { opacity: 1; pointer-events: all; }

  .drawer {
    position: fixed; top: 0; right: 0; bottom: 0; z-index: 201;
    width: 280px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    transform: translateX(100%);
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    padding: calc(var(--safe-top) + 60px) 0 calc(var(--safe-bottom) + 20px);
    display: flex; flex-direction: column; gap: 0;
    overflow-y: auto;
  }

  .drawer.open { transform: translateX(0); }

  .drawer-header {
    padding: 0 20px 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }

  .drawer-header h3 {
    font-size: 13px; font-weight: 700;
    letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--text2);
  }

  .drawer-item {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 20px;
    cursor: pointer;
    transition: background 0.15s;
    border-radius: 0;
  }

  .drawer-item:active { background: var(--card); }

  .drawer-dot {
    width: 10px; height: 10px;
    border-radius: 50%; flex-shrink: 0;
  }

  .drawer-item-label { font-size: 15px; font-weight: 500; }

  .drawer-item-count {
    margin-left: auto;
    font-size: 12px; color: var(--text3);
  }

  .drawer-reset {
    margin: 16px 20px 0;
    padding: 12px;
    background: rgba(255,107,107,0.1);
    border: 1px solid rgba(255,107,107,0.2);
    border-radius: var(--radius-sm);
    color: var(--accent3);
    font-size: 14px; font-weight: 600;
    text-align: center; cursor: pointer;
    transition: background 0.15s;
  }

  .drawer-reset:active { background: rgba(255,107,107,0.2); }

  /* ── MAIN CONTENT ── */
  .main {
    padding: 16px 14px calc(var(--safe-bottom) + 100px);
    display: flex; flex-direction: column; gap: 14px;
  }

  /* ── SECTION CARD ── */
  .section-card {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
    transition: box-shadow 0.3s ease;
  }

  .section-card:has(.section-complete) {
    border-color: rgba(0,201,167,0.3);
    box-shadow: 0 0 0 1px rgba(0,201,167,0.1), 0 8px 32px rgba(0,0,0,0.4);
  }

  .section-header {
    display: flex; align-items: center;
    padding: 16px 16px;
    cursor: pointer;
    gap: 12px;
    user-select: none;
    -webkit-user-select: none;
  }

  .section-icon {
    width: 38px; height: 38px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }

  .section-icon-0 { background: rgba(0,201,167,0.15); }
  .section-icon-1 { background: rgba(123,97,255,0.15); }
  .section-icon-2 { background: rgba(255,107,107,0.15); }
  .section-icon-3 { background: rgba(255,209,102,0.15); }

  .section-meta { flex: 1; min-width: 0; }

  .section-name {
    font-size: 15px; font-weight: 700;
    color: var(--text); line-height: 1.2;
  }

  .section-sub {
    font-size: 12px; color: var(--text3);
    margin-top: 2px;
  }

  .section-badge {
    font-size: 12px; font-weight: 700;
    padding: 4px 10px; border-radius: 20px;
    flex-shrink: 0;
  }

  .badge-0 { background: rgba(0,201,167,0.15); color: var(--accent); }
  .badge-1 { background: rgba(123,97,255,0.15); color: var(--accent2); }
  .badge-2 { background: rgba(255,107,107,0.15); color: var(--accent3); }
  .badge-3 { background: rgba(255,209,102,0.15); color: var(--accent4); }

  .section-chevron {
    font-size: 11px; color: var(--text3);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    flex-shrink: 0;
  }

  .section-body {
    max-height: 0; overflow: hidden;
    transition: max-height 0.4s cubic-bezier(0.4,0,0.2,1);
  }

  .section-body.open { max-height: 9999px; }
  .section-card.expanded .section-chevron { transform: rotate(180deg); }

  .section-divider {
    height: 1px; background: var(--border);
    margin: 0 16px;
  }

  /* ── CHECK ITEMS ── */
  .check-item {
    border-bottom: 1px solid var(--border);
  }

  .check-item:last-child { border-bottom: none; }

  .check-row {
    display: flex; align-items: flex-start;
    padding: 14px 16px; gap: 12px;
    cursor: pointer;
    transition: background 0.15s;
    user-select: none;
    -webkit-user-select: none;
  }

  .check-row:active { background: var(--card2); }

  .check-box {
    width: 24px; height: 24px;
    border-radius: 7px;
    border: 2px solid var(--border);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
    margin-top: 1px;
  }

  .check-box.checked {
    border-color: var(--accent);
    background: var(--accent);
  }

  .check-box.checked::after {
    content: '✓';
    color: #000;
    font-size: 14px;
    font-weight: 800;
    line-height: 1;
  }

  .check-sec-1 .check-box.checked { border-color: var(--accent2); background: var(--accent2); }
  .check-sec-2 .check-box.checked { border-color: var(--accent3); background: var(--accent3); }
  .check-sec-3 .check-box.checked { border-color: var(--accent4); background: var(--accent4); }
  .check-sec-3 .check-box.checked::after { color: #222; }

  .check-label-wrap { flex: 1; }

  .check-label {
    font-size: 14px; font-weight: 600;
    color: var(--text); line-height: 1.3;
    transition: color 0.2s;
  }

  .check-row.checked-row .check-label {
    color: var(--text3);
    text-decoration: line-through;
    text-decoration-color: var(--text3);
  }

  .check-hint {
    font-size: 11px; color: var(--text3);
    margin-top: 2px;
  }

  .check-expand-btn {
    font-size: 11px; color: var(--text3);
    transition: transform 0.25s ease;
    flex-shrink: 0; padding-top: 3px;
  }

  .check-item.expanded .check-expand-btn { transform: rotate(180deg); }

  /* ── ITEM DETAIL ── */
  .item-detail {
    max-height: 0; overflow: hidden;
    transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1);
    background: var(--card2);
  }

  .item-detail.open { max-height: 800px; }

  .item-detail-inner {
    padding: 0 16px 16px 52px;
  }

  .detail-block {
    margin-bottom: 12px;
  }

  .detail-label {
    font-size: 10px; font-weight: 700;
    letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--text3); margin-bottom: 6px;
  }

  .detail-body {
    font-size: 13px; color: var(--text2); line-height: 1.5;
  }

  .detail-body strong { color: var(--text); }

  .detail-chip-row {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-top: 4px;
  }

  .detail-chip {
    font-size: 11px; font-weight: 600;
    padding: 4px 10px; border-radius: 20px;
    background: var(--border); color: var(--text2);
  }

  .notes-label {
    font-size: 10px; font-weight: 700;
    letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--text3); margin-bottom: 6px;
  }

  .notes-field {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    padding: 10px 12px;
    resize: none;
    min-height: 60px;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.5;
  }

  .notes-field:focus { border-color: var(--accent); }
  .notes-field::placeholder { color: var(--text3); }

  /* ── BOTTOM SUMMARY CARD ── */
  .summary-card {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 16px;
    display: flex; flex-direction: column; gap: 12px;
  }

  .summary-title {
    font-size: 12px; font-weight: 700;
    letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--text3);
  }

  .summary-row {
    display: flex; align-items: center; gap: 10px;
  }

  .summary-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }

  .summary-name { font-size: 13px; flex: 1; color: var(--text2); }
  .summary-frac { font-size: 12px; font-weight: 700; color: var(--text3); }

  .summary-mini-bar {
    width: 60px; height: 4px;
    background: var(--border); border-radius: 2px; overflow: hidden;
  }

  .summary-mini-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }

  /* ── COMPLETE BANNER ── */
  .complete-banner {
    display: none;
    background: linear-gradient(135deg, rgba(0,201,167,0.15), rgba(123,97,255,0.15));
    border: 1px solid rgba(0,201,167,0.3);
    border-radius: var(--radius);
    padding: 20px;
    text-align: center;
  }

  .complete-banner.show { display: block; }

  .complete-banner h2 {
    font-size: 22px; font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 6px;
  }

  .complete-banner p {
    font-size: 13px; color: var(--text2);
  }

  /* ── TOOLTIP-STYLE SPEC TAGS ── */
  .spec-row {
    display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px;
  }

  .spec-tag {
    font-size: 11px; font-weight: 700;
    padding: 3px 9px; border-radius: 6px;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    color: var(--text2); font-family: 'SF Mono', 'Courier New', monospace;
    letter-spacing: 0;
  }

  .spec-tag.accent { border-color: var(--accent); color: var(--accent); }
  .spec-tag.accent2 { border-color: var(--accent2); color: var(--accent2); }
  .spec-tag.accent3 { border-color: var(--accent3); color: var(--accent3); }
  .spec-tag.accent4 { border-color: var(--accent4); color: var(--accent4); }

  /* ── SECTION JUMP ── */
  .jump-scroll { scroll-margin-top: 160px; }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: calc(var(--safe-bottom) + 80px); left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--card2); border: 1px solid var(--border);
    border-radius: 30px; padding: 10px 20px;
    font-size: 13px; font-weight: 600; color: var(--text);
    opacity: 0; pointer-events: none; z-index: 999;
    transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
    white-space: nowrap;
  }

  .toast.show {
    opacity: 1; transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header" id="top">
  <div class="header-row">
    <div class="header-title">
      <span>Pro Tools ACX</span>
      <span>Production Checklist</span>
    </div>
    <div class="hamburger" id="hamburger" onclick="toggleDrawer()">
      <span></span><span></span><span></span>
    </div>
  </div>
  <div class="progress-wrap">
    <div class="progress-labels">
      <span>Overall Progress</span>
      <span id="progress-text">0 / 0</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div class="section-progress-row" id="section-pips"></div>
  </div>
</div>

<!-- DRAWER OVERLAY -->
<div class="drawer-overlay" id="drawer-overlay" onclick="toggleDrawer()"></div>

<!-- DRAWER -->
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <h3>Jump to Section</h3>
  </div>
  <div id="drawer-nav"></div>
  <div class="drawer-reset" onclick="resetAll()">Reset All Progress</div>
</div>

<!-- MAIN -->
<main class="main" id="main-content"></main>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'acx_pt_v1';

const SECTIONS = [
  {
    id: 's0',
    icon: '✂️',
    name: 'Pro Tools Editing Chain',
    sub: '7 steps · Clean, committed audio',
    color: '#00c9a7',
    items: [
      {
        id: 's0_i0',
        label: 'Strip Silence',
        hint: 'Remove dead regions between takes',
        tips: 'Use Strip Silence (Cmd+U) to auto-detect and remove regions below a threshold. Set threshold conservatively — aim to keep breath tails and ambient tones.',
        settings: [
          { label: 'Strip Threshold', value: '−40 to −50 dBFS' },
          { label: 'Min Strip Duration', value: '500 ms' },
          { label: 'Pre/Post Pad', value: '50–100 ms' },
          { label: 'Region Start Pad', value: '10 ms' },
        ],
        tips2: 'Always preview before applying. Overly aggressive stripping will kill natural room sound between sentences.'
      },
      {
        id: 's0_i1',
        label: 'Replace Silence With Room Tone',
        hint: 'Fill gaps for seamless, natural flow',
        tips: 'Record 60 seconds of isolated room tone at session start. Loop a clean section and paste it under all stripped gaps using AudioSuite or manual placement.',
        settings: [
          { label: 'Room Tone Source', value: 'Dedicated RT clip, 60+ sec' },
          { label: 'Room Tone Level', value: 'Match natural floor, −55 to −65 dBFS' },
          { label: 'Crossfade In/Out', value: '3–5 ms' },
          { label: 'Placement', value: 'Below narration on dedicated track' },
        ],
        tips2: 'Keep room tone level identical to your noise floor. Inconsistent RT level will be immediately audible.'
      },
      {
        id: 's0_i2',
        label: 'Remove Clicks / Pops / Plosives',
        hint: 'Surgical repair of transient artifacts',
        tips: 'Use the Pencil tool for micro-edits on individual samples. Use AudioSuite Noise Reduction (gentle) or iZotope RX for click removal when pencil-drawing is impractical.',
        settings: [
          { label: 'Pencil Tool Mode', value: 'Parabolic or Line for short clips' },
          { label: 'Zoom Level', value: 'Sample-level (Cmd+[ to zoom)' },
          { label: 'RX Click Repair', value: 'Sensitivity 40–60, Frequency Skew: Low' },
          { label: 'Plosive Region', value: 'Clip-gain dip −3 to −6 dB on P/B transient' },
        ],
        tips2: 'For plosives, try a fast Clip Gain dip before reaching for plugins — it\'s faster and non-destructive.'
      },
      {
        id: 's0_i3',
        label: 'Breath Control Editing',
        hint: 'Tame disruptive breaths, preserve natural ones',
        tips: 'Never remove all breaths — ACX and listeners need them. Reduce volume of disruptive breaths by 6–12 dB using clip gain. Only remove breaths that interrupt meaning.',
        settings: [
          { label: 'Mild Breath Reduction', value: 'Clip Gain −6 dB' },
          { label: 'Heavy Breath Reduction', value: 'Clip Gain −12 dB' },
          { label: 'Full Remove', value: 'Only if mid-sentence interrupt' },
          { label: 'Before Chapter Break', value: 'Keep final breath at natural level' },
        ],
        tips2: 'Use the Trim tool in Waveform view for fast clip gain on breath regions. Work from a duplicate track initially to compare.'
      },
      {
        id: 's0_i4',
        label: 'Clip Gain Leveling',
        hint: 'Macro level pass before any processing',
        tips: 'Before applying plugins, manually set clip gain so all regions are within a 3–6 dB window. This gives compression and EQ a consistent signal to work with.',
        settings: [
          { label: 'Target Pre-Gain Level', value: '−18 to −12 dBFS average' },
          { label: 'Clip Gain Range', value: 'Adjust ±6 dB per region max' },
          { label: 'Tool', value: 'Smart Tool / Trim Tool in Waveform' },
          { label: 'Reference', value: 'Use Clip Gain display (Ctrl+Shift+G)' },
        ],
        tips2: 'Clip Gain is pre-fader and pre-plugin. Getting this right reduces the work your compressor has to do by 50%.'
      },
      {
        id: 's0_i5',
        label: 'Crossfades (3–5 ms)',
        hint: 'Smooth every edit point to prevent clicks',
        tips: 'Select all edited region boundaries and apply a quick crossfade. In Pro Tools use Cmd+F (Equal Power is standard for voice). Never leave raw edit points.',
        settings: [
          { label: 'Crossfade Duration', value: '3–5 ms (voice standard)' },
          { label: 'Crossfade Shape', value: 'Equal Power for natural voice' },
          { label: 'Batch Apply', value: 'Select All → Cmd+F' },
          { label: 'On Room Tone Fills', value: 'S-curve fades, 5–10 ms' },
        ],
        tips2: 'Enable "Preserve Fades" in your clip preferences. After batch crossfading, listen through at 1.5x to catch remaining clicks.'
      },
      {
        id: 's0_i6',
        label: 'Session Cleanup + Track Commit',
        hint: 'Consolidate and prepare for mixing',
        tips: 'Commit (Consolidate) your edited voice track to a single new audio file. This bakes in clip gain, removes all region boundaries, and gives the mix stage a clean, single clip to work with.',
        settings: [
          { label: 'Consolidate', value: 'Opt+Shift+3 / Track → Consolidate Clip' },
          { label: 'Output Format', value: 'WAV, 24-bit, session sample rate' },
          { label: 'Naming', value: 'ChXX_Voice_EDIT_v1.wav' },
          { label: 'Backup', value: 'Save full session with "Save Copy In" before committing' },
        ],
        tips2: 'Keep your original edited session (pre-commit) intact as a backup. The committed clip is your new source of truth for mixing.'
      }
    ]
  },
  {
    id: 's1',
    icon: '🎛️',
    name: 'Pro Tools Mixing Chain',
    sub: '4 processors · Shape and control dynamics',
    color: '#7b61ff',
    items: [
      {
        id: 's1_i0',
        label: 'EQ Cleanup',
        hint: 'High-pass, mud removal, harshness control',

// ── STATE ──
let state = loadState();

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { checks: {}, expanded: {}, notes: {}, sections: {} };
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

// ── BUILD UI ──
function buildUI() {
  buildDrawerNav();
  buildSectionPips();
  buildSections();
  updateProgress();
}

function buildDrawerNav() {
  const nav = document.getElementById('drawer-nav');
  nav.innerHTML = '';
  SECTIONS.forEach((sec, si) => {
    const div = document.createElement('div');
    div.className = 'drawer-item';
    div.innerHTML = `
      <div class="drawer-dot" style="background:${sec.color}"></div>
      <span class="drawer-item-label">${sec.name}</span>
      <span class="drawer-item-count" id="dnav-count-${si}"></span>
    `;
    div.onclick = () => {
      const el = document.getElementById(sec.id);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      toggleDrawer(false);
    };
    nav.appendChild(div);
  });
}

function buildSectionPips() {
  const row = document.getElementById('section-pips');
  row.innerHTML = '';
  SECTIONS.forEach((sec, si) => {
    const pip = document.createElement('div');
    pip.className = 'section-pip';
    pip.dataset.section = si;
    pip.innerHTML = `<div class="section-pip-fill" id="pip-fill-${si}"></div>`;
    pip.onclick = () => {
      const el = document.getElementById(sec.id);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    };
    row.appendChild(pip);
  });
}

function buildSections() {
  const main = document.getElementById('main-content');
  main.innerHTML = '';

  // Complete banner
  const banner = document.createElement('div');
  banner.className = 'complete-banner';
  banner.id = 'complete-banner';
  banner.innerHTML = `<h2>✅ Session Ready</h2><p>All ACX Pro Tools checks complete. You're cleared for upload.</p>`;
  main.appendChild(banner);

  SECTIONS.forEach((sec, si) => {
    const isExpanded = state.sections[sec.id] !== false; // default open
    const card = document.createElement('div');
    card.className = `section-card jump-scroll${isExpanded ? ' expanded' : ''}`;
    card.id = sec.id;

    card.innerHTML = `
      <div class="section-header" onclick="toggleSection('${sec.id}')">
        <div class="section-icon section-icon-${si}">${sec.icon}</div>
        <div class="section-meta">
          <div class="section-name">${sec.name}</div>
          <div class="section-sub">${sec.sub}</div>
        </div>
        <div class="section-badge badge-${si}" id="badge-${si}">0/${sec.items.length}</div>
        <div class="section-chevron">▼</div>
      </div>
      <div class="section-body${isExpanded ? ' open' : ''}" id="body-${sec.id}">
        <div class="section-divider"></div>
        <div id="items-${sec.id}"></div>
      </div>
    `;
    main.appendChild(card);

    buildItems(sec, si);
  });

  // Summary card
  const sumCard = document.createElement('div');
  sumCard.className = 'summary-card';
  sumCard.id = 'summary-card';
  sumCard.innerHTML = buildSummaryHTML();
  main.appendChild(sumCard);
}

function buildSummaryHTML() {
  let html = `<div class="summary-title">Section Overview</div>`;
  SECTIONS.forEach((sec, si) => {
    const done = sec.items.filter(it => state.checks[it.id]).length;
    const pct = sec.items.length ? Math.round(done / sec.items.length * 100) : 0;
    html += `
      <div class="summary-row">
        <div class="summary-dot" style="background:${sec.color}"></div>
        <div class="summary-name">${sec.name}</div>
        <div class="summary-frac" id="sum-frac-${si}">${done}/${sec.items.length}</div>
        <div class="summary-mini-bar">
          <div class="summary-mini-fill" id="sum-fill-${si}" style="background:${sec.color};width:${pct}%"></div>
        </div>
      </div>
    `;
  });
  return html;
}

function buildItems(sec, si) {
  const container = document.getElementById(`items-${sec.id}`);
  container.innerHTML = '';
  sec.items.forEach((item, ii) => {
    const isChecked = !!state.checks[item.id];
    const isExpanded = !!state.expanded[item.id];
    const noteVal = state.notes[item.id] || '';

    const div = document.createElement('div');
    div.className = `check-item check-sec-${si}${isExpanded ? ' expanded' : ''}`;
    div.id = `item-${item.id}`;

    const settingsHTML = item.settings ? item.settings.map(s =>
      `<div class="spec-tag accent${si === 0 ? '' : si === 1 ? '2' : si === 2 ? '3' : '4'}">${s.label}: ${s.value}</div>`
    ).join('') : '';

    div.innerHTML = `
      <div class="check-row${isChecked ? ' checked-row' : ''}" id="row-${item.id}" onclick="toggleCheck('${item.id}','${sec.id}',${si})">
        <div class="check-box${isChecked ? ' checked' : ''}" id="box-${item.id}"></div>
        <div class="check-label-wrap">
          <div class="check-label" id="label-${item.id}">${item.label}</div>
          <div class="check-hint">${item.hint}</div>
        </div>
        <div class="check-expand-btn" onclick="event.stopPropagation();toggleItemExpand('${item.id}')" id="expbtn-${item.id}">▼</div>
      </div>
      <div class="item-detail${isExpanded ? ' open' : ''}" id="detail-${item.id}">
        <div class="item-detail-inner">
          <div class="detail-block">
            <div class="detail-label">Tips</div>
            <div class="detail-body">${item.tips}</div>
          </div>
          ${item.settings ? `
          <div class="detail-block">
            <div class="detail-label">Pro Tools Settings</div>
            <div class="spec-row">${settingsHTML}</div>
          </div>` : ''}
          ${item.tips2 ? `
          <div class="detail-block">
            <div class="detail-label">Watch Out</div>
            <div class="detail-body">${item.tips2}</div>
          </div>` : ''}
          <div class="detail-block">
            <div class="notes-label">Session Notes</div>
            <textarea class="notes-field" id="notes-${item.id}" placeholder="Your notes..." oninput="saveNote('${item.id}',this.value)">${noteVal}</textarea>
          </div>
        </div>
      </div>
    `;
    container.appendChild(div);
  });
}

// ── INTERACTIONS ──
function toggleSection(secId) {
  const card = document.getElementById(secId);
  const body = document.getElementById(`body-${secId}`);
  const isExpanded = card.classList.toggle('expanded');
  body.classList.toggle('open', isExpanded);
  state.sections[secId] = isExpanded;
  saveState();
}

function toggleItemExpand(itemId) {
  const item = document.getElementById(`item-${itemId}`);
  const detail = document.getElementById(`detail-${itemId}`);
  const isExp = item.classList.toggle('expanded');
  detail.classList.toggle('open', isExp);
  state.expanded[itemId] = isExp;
  saveState();
}

function toggleCheck(itemId, secId, si) {
  const isChecked = !state.checks[itemId];
  state.checks[itemId] = isChecked;
  saveState();

  const box = document.getElementById(`box-${itemId}`);
  const row = document.getElementById(`row-${itemId}`);
  const label = document.getElementById(`label-${itemId}`);

  box.classList.toggle('checked', isChecked);
  row.classList.toggle('checked-row', isChecked);

  updateProgress();
}

function saveNote(itemId, val) {
  state.notes[itemId] = val;
  saveState();
}

function updateProgress() {
  let total = 0, done = 0;
  SECTIONS.forEach((sec, si) => {
    const secDone = sec.items.filter(it => state.checks[it.id]).length;
    total += sec.items.length;
    done += secDone;

    const pct = sec.items.length ? Math.round(secDone / sec.items.length * 100) : 0;

    const badge = document.getElementById(`badge-${si}`);
    if (badge) badge.textContent = `${secDone}/${sec.items.length}`;

    const pip = document.getElementById(`pip-fill-${si}`);
    if (pip) pip.style.width = pct + '%';

    const sumFrac = document.getElementById(`sum-frac-${si}`);
    if (sumFrac) sumFrac.textContent = `${secDone}/${sec.items.length}`;

    const sumFill = document.getElementById(`sum-fill-${si}`);
    if (sumFill) sumFill.style.width = pct + '%';

    const dnavCount = document.getElementById(`dnav-count-${si}`);
    if (dnavCount) dnavCount.textContent = `${secDone}/${sec.items.length}`;
  });

  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${done} / ${total}`;

  const banner = document.getElementById('complete-banner');
  if (banner) banner.classList.toggle('show', done === total && total > 0);
}

function toggleDrawer(forceState) {
  const drawer = document.getElementById('drawer');
  const overlay = document.getElementById('drawer-overlay');
  const hamburger = document.getElementById('hamburger');
  const shouldOpen = forceState !== undefined ? forceState : !drawer.classList.contains('open');
  drawer.classList.toggle('open', shouldOpen);
  overlay.classList.toggle('open', shouldOpen);
  hamburger.classList.toggle('open', shouldOpen);
  document.body.style.overflow = shouldOpen ? 'hidden' : '';
}

function resetAll() {
  if (!confirm('Reset all progress and notes?')) return;
  state = { checks: {}, expanded: {}, notes: {}, sections: {} };
  saveState();
  toggleDrawer(false);
  buildUI();
  showToast('Progress reset');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── INIT ──
buildUI();
</script>
